<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promo Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: #0b0f17;
    color: white;
    padding: 20px;
}

a {
    text-decoration:none;
    color:white;
}

.header {
    margin-bottom: 25px;
}

.header h1 {
    font-size: 32px;
    font-weight: 700;
}

.period {
    color: #8a93a5;
    margin-top: 4px;
}

.section-title {
    margin-bottom: 15px;
    font-size: 18px;
    color: #d7dde8;
}

.card {
    background: #151b28;
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 15px;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card:hover {
    transform: translateY(-2px);
}

.dg {
    border-left: 6px solid #f7d000;
}

.caseys {
    border-left: 6px solid #e53935;
}

.seven {
    border-left: 6px solid #2ecc71;
}

.card-title {
    font-size: 20px;
    font-weight: 600;
}

.arrow {
    font-size: 22px;
    color: #8a93a5;
}

.holiday-card {
    background: #1f2432;
    border-radius: 18px;
    padding: 18px;
    margin-top: 25px;
}

.holiday-title {
    font-size: 18px;
    margin-bottom: 10px;
}

.deadline {
    color: #ffb74d;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>Promo Hub</h1>
    <div class="period">Period 7</div>
</div>

<div class="section-title">
    Accounts
</div>

<a href="dg.html">
    <div class="card dg">
        <div class="card-title">DG</div>
        <div class="arrow">›</div>
    </div>
</a>

<a href="caseys.html">
    <div class="card caseys">
        <div class="card-title">Casey's</div>
        <div class="arrow">›</div>
    </div>
</a>

<a href="seveneleven.html">
    <div class="card seven">
        <div class="card-title">7-Eleven</div>
        <div class="arrow">›</div>
    </div>
</a>

<a href="holidays.html">

<div class="holiday-card">

    <div class="holiday-title">
        🎆 Holiday Ordering
    </div>

    <div class="deadline">
        July 4th Schedule Available →
    </div>

</div>

</a>


</body>
</html>
