<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Eleven - Promo Hub</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background: #0b0f17;
            color: white;
            padding: 20px;
        }

        .back {
            color: #8a93a5;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
        }

        .period {
            color: #8a93a5;
            margin: 5px 0 25px;
        }

        .week {
            background: #151b28;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 12px rgba(0,0,0,.25);
        }

        .current {
            border-left: 6px solid #f7d000;
            background: #192233;
        }

        .date {
            color: #8a93a5;
            margin: 8px 0 16px;
        }

        ul {
            padding-left: 20px;
            margin-bottom: 14px;
        }

        li {
            margin-bottom: 8px;
        }

        .section-title {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .section-title svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .navs {
            background: #5a2d82;
            color: #edd8ff;
        }

        .poet {
            background: #214b7a;
            color: #d7ecff;
        }
    </style>
</head>

<body>

<a href="index.html" class="back">← Back</a>

<h1>7-Eleven</h1>
<div class="period">Period 8</div>

<div class="week">
    <h2>Week 1</h2>
    <div class="date">7/12 - 7/18</div>
</div>

<div class="week current">
    <h2>Week 2</h2>
    <div class="date">7/19 - 7/25</div>

   

    <div class="section-title poet">
        <svg viewBox="0 0 24 24"><path d="M3 7.5 12 3l9 4.5M3 7.5V16.5L12 21m-9-13.5L12 12m9-4.5V16.5L12 21m0-9V21"/></svg>
        <span>POET</span>
    </div>

    <ul>
        <li>XXVL Cheetos PPW (1 Case, +550 WSA)</li>
    </ul>
</div>

<div class="week">
    <h2>Week 3</h2>
    <div class="date">7/26 - 8/1</div>

    <div class="section-title poet">
        <svg viewBox="0 0 24 24"><path d="M3 7.5 12 3l9 4.5M3 7.5V16.5L12 21m-9-13.5L12 12m9-4.5V16.5L12 21m0-9V21"/></svg>
        <span>POET</span>
    </div>

    <ul>
        <li>XXVL Lay's Kettle Cooked Jalapeño</li>
        <li>XXVL Smartfood</li>
        <li>XXVL Dinamita</li>
        <li>8 Each • All Stores</li>
    </ul>
</div>

<div class="week">
    <h2>Week 4</h2>
    <div class="date">8/2 - 8/8</div>
</div>

</body>
</html>
